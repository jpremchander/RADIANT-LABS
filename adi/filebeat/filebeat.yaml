apiVersion: v1
kind: ConfigMap
metadata:
  name: filebeat-config
  namespace: adi
data:
  filebeat.yml: |
    filebeat.inputs:
    - type: filestream
      id: suricata-eve
      enabled: true
      paths:
        - /var/log/suricata/eve.json
      parsers:
        - ndjson:
            target: ""
            add_error_key: true
      fields:
        source: suricata
        environment: radiant-lab
      fields_under_root: false

    processors:
      - add_host_metadata:
          when.not.contains.tags: forwarded
      - add_cloud_metadata: ~
      - decode_json_fields:
          fields: ["message"]
          target: ""
          overwrite_keys: true
          when:
            has_fields: ["message"]

    output.elasticsearch:
      hosts: ["elasticsearch.monitoring.svc.cluster.local:9200"]
      index: "suricata-%{+yyyy.MM.dd}"
      template.name: "suricata"
      template.pattern: "suricata-*"

    setup.template:
      name: "suricata"
      pattern: "suricata-*"
      enabled: true

    setup.kibana:
      host: "kibana.monitoring.svc.cluster.local:5601"

    logging.level: info
    logging.to_files: true
    logging.files:
      path: /var/log/filebeat
      name: filebeat
      keepfiles: 3
      permissions: 0644
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: filebeat
  namespace: adi
  labels:
    app: filebeat
    project: radiant
spec:
  selector:
    matchLabels:
      app: filebeat
  template:
    metadata:
      labels:
        app: filebeat
        project: radiant
    spec:
      serviceAccountName: filebeat-sa
      terminationGracePeriodSeconds: 30
      containers:
      - name: filebeat
        image: docker.elastic.co/beats/filebeat:8.13.4
        imagePullPolicy: Never
        args:
        - -c
        - /etc/filebeat.yml
        - -e
        securityContext:
          runAsUser: 0
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        volumeMounts:
        - name: filebeat-config
          mountPath: /etc/filebeat.yml
          subPath: filebeat.yml
          readOnly: true
        - name: suricata-logs
          mountPath: /var/log/suricata
          readOnly: true
      volumes:
      - name: filebeat-config
        configMap:
          name: filebeat-config
          defaultMode: 0640
      - name: suricata-logs
        hostPath:
          path: /var/log/suricata
          type: DirectoryOrCreate
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: filebeat-sa
  namespace: adi
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: filebeat-role
rules:
- apiGroups: [""]
  resources: ["namespaces","pods","nodes"]
  verbs: ["get","watch","list"]
- apiGroups: ["apps"]
  resources: ["replicasets"]
  verbs: ["get","list","watch"]
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["get","list","watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: filebeat-binding
subjects:
- kind: ServiceAccount
  name: filebeat-sa
  namespace: adi
roleRef:
  kind: ClusterRole
  name: filebeat-role
  apiGroup: rbac.authorization.k8s.io
