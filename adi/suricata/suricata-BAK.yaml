apiVersion: v1
kind: ConfigMap
metadata:
  name: suricata-rules
  namespace: adi
data:
  misp-iocs.rules: |
    # RADIANT seed rules - updated by CronJob every 15 minutes
    alert http any any -> $EXTERNAL_NET any (msg:"RADIANT - Suspicious POST to gate.php"; flow:established,to_server; http.method; content:"POST"; http.uri; content:"/gate.php"; sid:9000001; rev:1; classtype:trojan-activity;)
    alert dns any any -> any any (msg:"RADIANT - Suspicious long DNS subdomain"; dns.query; pcre:"/[a-z0-9]{12,}\.(com|net|org|io)/i"; sid:9000002; rev:1; classtype:trojan-activity;)
    alert tcp $HOME_NET any -> $EXTERNAL_NET 443 (msg:"RADIANT - Cobalt Strike beacon size"; flow:established,to_server; dsize:300<>500; sid:9000003; rev:1; classtype:trojan-activity;)
    alert http $HOME_NET any -> $EXTERNAL_NET any (msg:"RADIANT - IcedID style checkin"; flow:established,to_server; http.method; content:"GET"; http.uri; content:"/"; depth:1; sid:9000004; rev:1; classtype:trojan-activity;)
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: suricata
  namespace: adi
  labels:
    app: suricata
    project: radiant
spec:
  selector:
    matchLabels:
      app: suricata
  template:
    metadata:
      labels:
        app: suricata
        project: radiant
    spec:
      hostNetwork: true
      hostPID: false
      dnsPolicy: ClusterFirstWithHostNet
      containers:
      - name: suricata
        image: docker.io/jasonish/suricata:7.0
        imagePullPolicy: Never
        args:
        - -i
        - ens33
        - -v
        securityContext:
          capabilities:
            add:
            - NET_ADMIN
            - NET_RAW
            - SYS_NICE
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        env:
        - name: HOME_NET
          value: "192.168.10.0/24"
        volumeMounts:
        - name: suricata-rules
          mountPath: /var/lib/suricata/rules/misp-iocs.rules
          subPath: misp-iocs.rules
        - name: suricata-logs
          mountPath: /var/log/suricata
        livenessProbe:
          exec:
            command:
            - test
            - -f
            - /var/log/suricata/suricata.log
          initialDelaySeconds: 60
          periodSeconds: 30
          failureThreshold: 5
      volumes:
      - name: suricata-rules
        configMap:
          name: suricata-rules
      - name: suricata-logs
        hostPath:
          path: /var/log/suricata
          type: DirectoryOrCreate
