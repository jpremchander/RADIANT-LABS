apiVersion: v1
kind: ConfigMap
metadata:
  name: suricata-rules
  namespace: adi
data:
  misp-iocs.rules: |
    alert icmp any any -> any any (msg:"RADIANT ICMP test"; sid:9000001; rev:1;)
    alert http any any -> any any (msg:"RADIANT HTTP POST gate.php"; flow:established,to_server; http.method; content:"POST"; http.uri; content:"/gate.php"; sid:9000002; rev:1; classtype:trojan-activity;)
    alert dns any any -> any any (msg:"RADIANT suspicious DNS query"; dns.query; pcre:"/[a-z0-9]{12,}\.(com|net|org)/i"; sid:9000003; rev:1; classtype:trojan-activity;)
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: suricata
  namespace: adi
  labels:
    app: suricata
    project: radiant
spec:
  selector:
    matchLabels:
      app: suricata
  template:
    metadata:
      labels:
        app: suricata
        project: radiant
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      initContainers:
      - name: copy-rules
        image: docker.io/library/busybox:1.36
        imagePullPolicy: IfNotPresent
        command:
        - sh
        - -c
        - cp /rules-src/misp-iocs.rules /rules-dst/misp-iocs.rules && echo "Rules copied OK"
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "64Mi"
            cpu: "100m"
        volumeMounts:
        - name: suricata-rules-src
          mountPath: /rules-src
        - name: suricata-rules-dst
          mountPath: /rules-dst
      containers:
      - name: suricata
        image: docker.io/jasonish/suricata:7.0
        imagePullPolicy: IfNotPresent
        securityContext:
          capabilities:
            add:
            - NET_ADMIN
            - NET_RAW
            - SYS_NICE
        command:
        - /bin/sh
        - -c
        - |
          exec suricata -i eth0 -l /var/log/suricata -S /var/lib/suricata/rules/misp-iocs.rules -v
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        volumeMounts:
        - name: suricata-rules-dst
          mountPath: /var/lib/suricata/rules
        - name: suricata-logs
          mountPath: /var/log/suricata
      volumes:
      - name: suricata-rules-src
        configMap:
          name: suricata-rules
      - name: suricata-rules-dst
        emptyDir: {}
      - name: suricata-logs
        hostPath:
          path: /var/log/suricata
          type: DirectoryOrCreate
