apiVersion: v1
kind: ConfigMap
metadata:
  name: suricata-config
  namespace: adi
data:
  suricata.yaml: |
    %YAML 1.1
    ---
    vars:
      address-groups:
        HOME_NET: "[192.168.10.0/24]"
        EXTERNAL_NET: "!$HOME_NET"

    default-log-dir: /var/log/suricata

    outputs:
      - eve-log:
          enabled: yes
          filetype: regular
          filename: eve.json
          types:
            - alert
            - dns
            - http
            - tls
            - flow

      - fast:
          enabled: yes
          filename: fast.log

    af-packet:
      - interface: ens33
        cluster-id: 99
        cluster-type: cluster_flow
        defrag: yes

    pcap:
      - interface: ens33

    detect-engine:
      - profile: medium

    rule-files:
      - misp-iocs.rules

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: suricata-rules
  namespace: adi
data:
  misp-iocs.rules: |
    alert http any any -> $EXTERNAL_NET any (msg:"RADIANT - Suspicious POST to gate.php"; flow:established,to_server; http.method; content:"POST"; http.uri; content:"/gate.php"; sid:9000001; rev:1; classtype:trojan-activity;)
    alert dns any any -> any any (msg:"RADIANT - Suspicious long DNS subdomain"; dns.query; pcre:"/[a-z0-9]{12,}\.(com|net|org|io)/i"; sid:9000002; rev:1; classtype:trojan-activity;)
    alert tcp $HOME_NET any -> $EXTERNAL_NET 443 (msg:"RADIANT - Cobalt Strike beacon size"; flow:established,to_server; dsize:300<>500; sid:9000003; rev:1; classtype:trojan-activity;)
    alert http $HOME_NET any -> $EXTERNAL_NET any (msg:"RADIANT - IcedID style checkin"; flow:established,to_server; http.method; content:"GET"; http.uri; content:"/"; depth:1; sid:9000004; rev:1; classtype:trojan-activity;)

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: suricata
  namespace: adi
  labels:
    app: suricata
    project: radiant
spec:
  selector:
    matchLabels:
      app: suricata
  template:
    metadata:
      labels:
        app: suricata
        project: radiant
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: suricata
          image: docker.io/jasonish/suricata:7.0
          imagePullPolicy: Never
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
                - SYS_NICE
          args:
            - -c
            - /etc/suricata/suricata.yaml
            - -i
            - ens33
            - -l
            - /var/log/suricata
            - -v
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          volumeMounts:
            - name: suricata-config
              mountPath: /etc/suricata/suricata.yaml
              subPath: suricata.yaml
            - name: suricata-rules
              mountPath: /var/lib/suricata/rules/misp-iocs.rules
              subPath: misp-iocs.rules
            - name: suricata-logs
              mountPath: /var/log/suricata
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "test -f /var/log/suricata/eve.json"
            initialDelaySeconds: 90
            periodSeconds: 30
            failureThreshold: 5
      volumes:
        - name: suricata-config
          configMap:
            name: suricata-config
        - name: suricata-rules
          configMap:
            name: suricata-rules
        - name: suricata-logs
          hostPath:
            path: /var/log/suricata
            type: DirectoryOrCreate