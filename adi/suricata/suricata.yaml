apiVersion: v1
kind: ConfigMap
metadata:
  name: suricata-config
  namespace: adi
data:
  suricata.yaml: |
    %YAML 1.1
    ---
    vars:
      address-groups:
        HOME_NET: "[192.168.10.0/24]"
        EXTERNAL_NET: "!$HOME_NET"

    default-log-dir: /var/log/suricata

    outputs:
      - eve-log:
          enabled: yes
          filetype: regular
          filename: eve.json
          types:
            - alert
            - dns
            - http
            - tls
            - flow
      - fast:
          enabled: yes
          filename: fast.log

    af-packet:
      - interface: ens33
        cluster-id: 99
        cluster-type: cluster_flow
        defrag: yes

    pcap:
      - interface: ens33

    detect-engine:
      - profile: medium

    rule-files:
      - /var/lib/suricata/rules/misp-iocs.rules

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: suricata-rules
  namespace: adi
data:
  misp-iocs.rules: |
    alert icmp any any -> any any (msg:"RADIANT ICMP test"; sid:9000001; rev:1;)

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: suricata
  namespace: adi
  labels:
    app: suricata
    project: radiant
spec:
  selector:
    matchLabels:
      app: suricata
  template:
    metadata:
      labels:
        app: suricata
        project: radiant
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: suricata
          image: docker.io/jasonish/suricata:7.0
          imagePullPolicy: Never
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
                - SYS_NICE
          args:
            - -c
            - /etc/suricata/suricata.yaml
            - -i
            - ens33
            - -l
            - /var/log/suricata
            - -v
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          volumeMounts:
            - name: suricata-config
              mountPath: /etc/suricata/suricata.yaml
              subPath: suricata.yaml
            - name: suricata-rules
              mountPath: /var/lib/suricata/rules/misp-iocs.rules
              subPath: misp-iocs.rules
            - name: suricata-logs
              mountPath: /var/log/suricata
      volumes:
        - name: suricata-config
          configMap:
            name: suricata-config
        - name: suricata-rules
          configMap:
            name: suricata-rules
        - name: suricata-logs
          hostPath:
            path: /var/log/suricata
            type: DirectoryOrCreate