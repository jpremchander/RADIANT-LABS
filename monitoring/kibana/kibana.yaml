apiVersion: v1
kind: Service
metadata:
  name: kibana
  namespace: monitoring
  labels:
    app: kibana
    project: radiant
spec:
  type: NodePort
  selector:
    app: kibana
  ports:
  - name: http
    port: 5601
    targetPort: 5601
    nodePort: 30601
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kibana
  namespace: monitoring
  labels:
    app: kibana
    project: radiant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kibana
  template:
    metadata:
      labels:
        app: kibana
        project: radiant
    spec:
      initContainers:
      - name: wait-for-elasticsearch
        image: docker.io/library/busybox:1.36
        command:
        - sh
        - -c
        - |
          until wget -qO- http://elasticsearch.monitoring.svc.cluster.local:9200/_cluster/health 2>/dev/null | grep -q '"status"'; do
            echo "Waiting for Elasticsearch..."; sleep 10;
          done
          echo "Elasticsearch is ready"
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "64Mi"
            cpu: "100m"
      containers:
      - name: kibana
        image: docker.io/library/kibana:8.13.4
        imagePullPolicy: Never
        env:
        - name: ELASTICSEARCH_HOSTS
          value: "http://elasticsearch.monitoring.svc.cluster.local:9200"
        - name: SERVER_NAME
          value: "kibana.lab"
        - name: SERVER_HOST
          value: "0.0.0.0"
        - name: SERVER_PORT
          value: "5601"
        - name: XPACK_SECURITY_ENABLED
          value: "false"
        - name: TELEMETRY_ENABLED
          value: "false"
        - name: SERVER_PUBLICBASEURL
          value: "http://kibana.lab"
        ports:
        - name: http
          containerPort: 5601
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /api/status
            port: 5601
          initialDelaySeconds: 60
          periodSeconds: 15
          timeoutSeconds: 10
          failureThreshold: 10
        livenessProbe:
          httpGet:
            path: /api/status
            port: 5601
          initialDelaySeconds: 120
          periodSeconds: 30
          timeoutSeconds: 10
