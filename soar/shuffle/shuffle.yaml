apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: shuffle-data
  namespace: soar
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: shuffle
  namespace: soar
  labels:
    app: shuffle
    project: radiant
spec:
  type: ClusterIP
  selector:
    app: shuffle-frontend
  ports:
  - name: http
    port: 3001
    targetPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: shuffle-backend
  namespace: soar
  labels:
    app: shuffle-backend
spec:
  type: ClusterIP
  selector:
    app: shuffle-backend
  ports:
  - name: http
    port: 5001
    targetPort: 5001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shuffle-frontend
  namespace: soar
  labels:
    app: shuffle-frontend
    project: radiant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shuffle-frontend
  template:
    metadata:
      labels:
        app: shuffle-frontend
        project: radiant
    spec:
      containers:
      - name: shuffle-frontend
        image: ghcr.io/shuffle/shuffle-frontend:latest
        imagePullPolicy: Always
        env:
        - name: BACKEND_HOSTNAME
          value: "shuffle-backend.soar.svc.cluster.local"
        - name: BACKEND_PORT
          value: "5001"
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "300m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shuffle-backend
  namespace: soar
  labels:
    app: shuffle-backend
    project: radiant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shuffle-backend
  template:
    metadata:
      labels:
        app: shuffle-backend
        project: radiant
    spec:
      containers:
      - name: shuffle-backend
        image: ghcr.io/shuffle/shuffle-backend:latest
        imagePullPolicy: Always
        env:
        - name: DATASTORE_EMULATOR_HOST
          value: "shuffle-opensearch.soar.svc.cluster.local:9200"
        - name: SHUFFLE_OPENSEARCH_URL
          value: "http://shuffle-opensearch.soar.svc.cluster.local:9200"
        - name: SHUFFLE_APP_HOTLOAD_FOLDER
          value: "/shuffle-apps"
        - name: SHUFFLE_FILE_LOCATION
          value: "/shuffle-files"
        - name: OUTER_HOSTNAME
          value: "shuffle-backend.soar.svc.cluster.local"
        - name: ORG_ID
          value: "radiant"
        - name: ENVIRONMENT_NAME
          value: "radiant-lab"
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: shuffle-secret
              key: db-password
        ports:
        - containerPort: 5001
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: shuffle-data
          mountPath: /shuffle-files
      volumes:
      - name: shuffle-data
        persistentVolumeClaim:
          claimName: shuffle-data
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shuffle-opensearch
  namespace: soar
  labels:
    app: shuffle-opensearch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shuffle-opensearch
  template:
    metadata:
      labels:
        app: shuffle-opensearch
    spec:
      initContainers:
      - name: sysctl
        image: busybox:1.36
        command: ["sysctl", "-w", "vm.max_map_count=262144"]
        securityContext:
          privileged: true
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "150m"
      containers:
      - name: opensearch
        image: opensearchproject/opensearch:2.14.0
        imagePullPolicy: IfNotPresent
        env:
        - name: discovery.type
          value: single-node
        - name: OPENSEARCH_JAVA_OPTS
          value: "-Xms256m -Xmx256m"
        - name: DISABLE_SECURITY_PLUGIN
          value: "true"
        ports:
        - containerPort: 9200
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "768Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: shuffle-opensearch
  namespace: soar
spec:
  type: ClusterIP
  selector:
    app: shuffle-opensearch
  ports:
  - port: 9200
    targetPort: 9200
