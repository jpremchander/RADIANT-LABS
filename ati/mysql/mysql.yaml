apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: ati
  labels:
    app: mysql
    project: radiant
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: mysql
  ports:
  - name: mysql
    port: 3306
    targetPort: 3306
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: ati
  labels:
    app: mysql
    project: radiant
spec:
  serviceName: mysql
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
        project: radiant
    spec:
      terminationGracePeriodSeconds: 60
      containers:
      - name: mysql
        image: mysql:8.4
        imagePullPolicy: IfNotPresent
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: root-password
        - name: MYSQL_DATABASE
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: misp-database
        - name: MYSQL_USER
          value: misp
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: misp-password
        - name: MYSQL_INNODB_BUFFER_POOL_SIZE
          value: "512M"
        ports:
        - name: mysql
          containerPort: 3306
          protocol: TCP
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "800Mi"
            cpu: "500m"
        readinessProbe:
          exec:
            command:
            - bash
            - -c
            - "mysqladmin ping -u root -p${MYSQL_ROOT_PASSWORD} --silent"
          initialDelaySeconds: 40
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 6
        livenessProbe:
          exec:
            command:
            - bash
            - -c
            - "mysqladmin ping -u root -p${MYSQL_ROOT_PASSWORD} --silent"
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 5
        volumeMounts:
        - name: mysql-data
          mountPath: /var/lib/mysql
        - name: mysql-config
          mountPath: /etc/mysql/conf.d
      volumes:
      - name: mysql-config
        configMap:
          name: mysql-config
  volumeClaimTemplates:
  - metadata:
      name: mysql-data
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: local-path
      resources:
        requests:
          storage: 20Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-config
  namespace: ati
data:
  misp.cnf: |
    [mysqld]
    innodb_buffer_pool_size = 512M
    max_allowed_packet      = 64M
    character-set-server    = utf8mb4
    collation-server        = utf8mb4_unicode_ci
    default-time-zone       = '+00:00'
    slow_query_log          = 1
    long_query_time         = 2
