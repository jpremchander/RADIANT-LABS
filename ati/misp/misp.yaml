apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: misp-data
  namespace: ati
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: misp
  namespace: ati
  labels:
    app: misp
    project: radiant
spec:
  type: NodePort
  selector:
    app: misp
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080
    - name: https
      port: 443
      targetPort: 443
      nodePort: 30443
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: misp
  namespace: ati
  labels:
    app: misp
    project: radiant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: misp
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: misp
        project: radiant
    spec:
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z mysql.ati.svc.cluster.local 3306; do
                echo "Waiting for MySQL..."; sleep 5;
              done
              echo "MySQL is ready"
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "64Mi"
              cpu: "100m"

        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z redis.ati.svc.cluster.local 6379; do
                echo "Waiting for Redis..."; sleep 3;
              done
              echo "Redis is ready"
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "64Mi"
              cpu: "100m"

      containers:
        - name: misp
          image: ghcr.io/misp/misp-docker/misp-core:latest
          imagePullPolicy: Never
          env:
            - name: MYSQL_HOST
              value: "mysql.ati.svc.cluster.local"
            - name: MYSQL_PORT
              value: "3306"
            - name: MYSQL_DATABASE
              value: "misp"
            - name: MYSQL_USER
              value: "misp"
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: misp-password

            - name: REDIS_HOST
              value: "redis.ati.svc.cluster.local"
            - name: REDIS_PORT
              value: "6379"

            - name: ADMIN_EMAIL
              value: "admin@radiant.lab"
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: misp-secret
                  key: admin-password
            - name: ADMIN_ORG
              value: "RADIANT-LAB"

            # Official misp-docker variable
            - name: BASE_URL
              value: "http://192.168.10.90"

            # Keep settings in config.php behavior explicit
            - name: ENABLE_DB_SETTINGS
              value: "false"

          ports:
            - name: http
              containerPort: 80
            - name: https
              containerPort: 443

          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    sleep 20
                    CONFIG=/var/www/MISP/app/Config/config.php
                    HTACCESS=/var/www/MISP/app/webroot/.htaccess

                    # Force lab HTTP URL after container startup logic completes
                    sed -i 's|https://localhost|http://192.168.10.90|g' "$CONFIG"
                    sed -i 's|http://localhost|http://192.168.10.90|g' "$CONFIG"
                    sed -i 's|https://192.168.10.90:30080|http://192.168.10.90|g' "$CONFIG"
                    sed -i 's|http://192.168.10.90:30080|http://192.168.10.90|g' "$CONFIG"

                    # Best-effort disable force_https if present
                    sed -i "s|'Security.force_https' => true|'Security.force_https' => false|g" "$CONFIG" || true
                    sed -i "s|'Security.force_https' => '1'|'Security.force_https' => false|g" "$CONFIG" || true

                    # Disable HTTPS rewrite in .htaccess if present
                    sed -i 's|^RewriteCond %{HTTPS} !=on|# RewriteCond %{HTTPS} !=on|g' "$HTACCESS" || true
                    sed -i 's|^RewriteRule \^ https://%{SERVER_NAME}%{REQUEST_URI} \[L,R=301\]|# RewriteRule disabled|g' "$HTACCESS" || true

                    # Log final values for troubleshooting
                    grep -n "baseurl\|external_baseurl\|rest_client_baseurl" "$CONFIG" || true

          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "1.5Gi"
              cpu: "1000m"

          readinessProbe:
            httpGet:
              scheme: HTTPS
              path: /users/login
              port: 443
            initialDelaySeconds: 120
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 10

          livenessProbe:
            httpGet:
              scheme: HTTPS
              path: /users/login
              port: 443
            initialDelaySeconds: 180
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5

          volumeMounts:
            - name: misp-data
              mountPath: /var/www/MISP/app/files
            - name: misp-config
              mountPath: /var/www/MISP/app/Config

      volumes:
        - name: misp-data
          persistentVolumeClaim:
            claimName: misp-data
        - name: misp-config
          emptyDir: {}